  <p class="vertalign"> Paintomatic shows what types of pitches a pitcher throws, how often they throw them (size of circle)
     pitch value (color) and pitch movement. All data sourced from fangraphs.
  </div>

<script>

  $(function() {
    var updateAnchor = function(playerName1) {
      $.uriAnchor.setAnchor({
        player1: playerName1
      });
    };

    $.getJSON('paintomaticplayer.json', function(data) {
      var players1 = data;

      $("#player-names1").autocomplete({
        source: players1,
        select: function(event, ui) {
          updateAnchor(ui.item.value);
        }
      });

      var onHashChange = function() {
        var anchorMap = $.uriAnchor.makeAnchorMap();
        var playerName1 = anchorMap['player1'];
        var player1 = players1.find(function(player1) {
          return player1.value == playerName1
        });
        if (player1) {
          $('#player-names1').val(player1.value);
          $("#player-paintomatic-link1").attr("href", "images/paintomatic/" + player1.icon);
          $("#player-paintomatic1").attr("src", "images/paintomatic/" + player1.icon);
        } else {
          var placeHolderPlayer1 = players1[0];
          updateAnchor(placeHolderPlayer1.value);
        }
      };


    





      $(window)
        .bind('hashchange', onHashChange)
        .trigger('hashchange');

      $('#random-button1').click(function() {
        var placeHolderPlayer1 = players1[Math.floor(Math.random() * players1.length)];
        updateAnchor(placeHolderPlayer1.value)
      });

      });
    });
  });
</script>
